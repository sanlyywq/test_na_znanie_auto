<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Авто-Квест: Чёрно-красный вызов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* легкий эффект, чтобы не выделялось */
        }

        body {
            background: linear-gradient(145deg, #0a0a0a 0%, #1a0000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', 'Courier New', monospace;
            padding: 20px;
        }

        /* главный контейнер */
        .game-container {
            max-width: 650px;
            width: 100%;
            background: #0c0c0c;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 2px #2a0000, 0 0 0 5px #0a0a0a;
            overflow: hidden;
            transition: all 0.2s;
        }

        /* шапка */
        .header {
            background: #000000;
            padding: 18px 24px;
            border-bottom: 3px solid #b91c1c;
            text-align: center;
        }

        .header h1 {
            color: #e63946;
            font-size: 1.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 800;
            text-shadow: 0 0 5px #ff000080;
            word-break: keep-all;
        }

        .header p {
            color: #7a7a7a;
            font-size: 0.8rem;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* область контента */
        .content {
            padding: 30px 22px 40px;
            background: #111111;
        }

        /* СТАРТОВЫЙ экран (выбор) */
        .start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            transition: 0.2s;
        }

        .start-logo {
            font-size: 5rem;
            filter: drop-shadow(0 0 6px red);
        }

        .btn-start {
            background: #1f1f1f;
            border: 2px solid #b91c1c;
            color: #ffcaca;
            font-size: 2rem;
            font-weight: bold;
            padding: 18px 32px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
            letter-spacing: 4px;
            box-shadow: 0 5px 0 #4a0000;
        }

        .btn-start:hover {
            background: #2c0000;
            border-color: #ff3a3a;
            color: white;
            transform: scale(1.02);
            box-shadow: 0 2px 0 #4a0000;
        }

        /* модальное окно выбора (да/нет) */
        .modal-choice {
            background: #0e0e0e;
            border: 2px solid #aa2e2e;
            border-radius: 36px;
            padding: 24px 20px;
            text-align: center;
            margin-top: 20px;
            box-shadow: 0 10px 25px black;
        }

        .modal-choice p {
            color: #e0e0e0;
            font-size: 1.3rem;
            margin-bottom: 24px;
            font-weight: bold;
        }

        .choice-buttons {
            display: flex;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
        }

        .choice-yes, .choice-no {
            border: none;
            font-size: 1.2rem;
            padding: 10px 28px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.15s linear;
            font-family: inherit;
        }

        .choice-yes {
            background: #8b0000;
            color: white;
            box-shadow: 0 2px 8px red;
        }

        .choice-yes:hover {
            background: #c70000;
            transform: scale(1.03);
        }

        .choice-no {
            background: #2c2c2c;
            color: #bbbbbb;
            border: 1px solid #6b2e2e;
        }

        .choice-no:hover {
            background: #3a1111;
            color: white;
        }

        /* ТЕСТОВАЯ ОБЛАСТЬ */
        .quiz-area {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* вопросная рамка */
        .question-card {
            background: #0c0b0b;
            border: 2px solid #ad2a2a;
            border-radius: 48px;
            padding: 28px 18px 32px;
            text-align: center;
            box-shadow: inset 0 0 12px #2a0000, 0 10px 20px rgba(0,0,0,0.5);
        }

        .model-name {
            font-size: 3.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f0f0f0, #ffb7b7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px #ff3333;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            word-break: break-word;
        }

        .answers-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-top: 12px;
        }

        .answer-btn {
            background: #1a1a1a;
            border: 2px solid #800000;
            border-radius: 60px;
            padding: 14px 12px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffe2e2;
            cursor: pointer;
            transition: 0.07s linear;
            font-family: monospace;
            text-align: center;
        }

        .answer-btn:hover:not(:disabled) {
            background: #2e0e0e;
            border-color: #ff5e5e;
            transform: scale(0.99);
            color: white;
        }

        .answer-btn.correct-feedback {
            background: #1f4d1f;
            border-color: #6eff6e;
            color: #d0ffd0;
        }

        .answer-btn.wrong-feedback {
            background: #6d1a1a;
            border-color: #ff5555;
            color: #ffc8c8;
            text-decoration: line-through;
        }

        /* прогресс и кнопка далее */
        .progress-bar {
            margin: 25px 0 12px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            color: #b1b1b1;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .progress-text {
            background: #200000;
            padding: 5px 14px;
            border-radius: 40px;
        }

        .next-btn {
            background: #2f0000;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ecb3b3;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 18px;
            transition: 0.1s;
            font-family: monospace;
            letter-spacing: 2px;
        }

        .next-btn:enabled {
            background: #9b2c2c;
            color: white;
            box-shadow: 0 2px 10px darkred;
        }

        .next-btn:enabled:hover {
            background: #bc3f3f;
            transform: scale(0.99);
        }

        .result-area {
            background: #0e0e0e;
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            margin-top: 20px;
            border: 1px solid crimson;
        }

        .restart-btn {
            background: #6b1818;
            border: none;
            padding: 12px 24px;
            margin-top: 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        footer {
            background: #050505;
            text-align: center;
            padding: 12px;
            font-size: 0.7rem;
            color: #5e2d2d;
        }

        /* disabled state */
        .answer-btn:disabled {
            opacity: 0.7;
            cursor: default;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 500px) {
            .model-name { font-size: 2.2rem; }
            .answer-btn { font-size: 1rem; padding: 10px; }
            .btn-start { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <h1>🔥 BLACK & RED QUIZ 🔥</h1>
        <p>автомобильный квест | 50 моделей</p>
    </div>
    <div class="content">
        <!-- СТАРТОВАЯ ЗОНА (экран "пройти квест") -->
        <div id="startScreen" class="start-screen">
            <div class="start-logo">⚡🚗⚡</div>
            <button id="mainStartBtn" class="btn-start">ПРОЙТИ КВЕСТ</button>
        </div>

        <!-- зона для модального окна да/нет -->
        <div id="modalDecisionArea" style="margin-top: 20px;"></div>

        <!-- ОСНОВНОЙ ТЕСТ (изначально скрыт) -->
        <div id="quizArea" class="quiz-area">
            <div class="question-card">
                <div class="model-name" id="questionModel">Logan</div>
                <div class="answers-list" id="answersContainer"></div>
            </div>
            <div class="progress-bar">
                <span class="progress-text" id="progressCounter">Вопрос 1 / 50</span>
                <span id="scoreIndicator" style="background:#1c1c1c; padding:4px 12px; border-radius:40px;">✅ 0</span>
            </div>
            <button id="nextButton" class="next-btn" disabled>➡ ДАЛЕЕ ⬅</button>
            <div id="quizResultBlock"></div>
        </div>
    </div>
    <footer>вызов принят? только факты 🚘</footer>
</div>

<script>
    // ---------- 50 ВОПРОСОВ (модель + правильная марка + варианты-дистракторы) ----------
    // структура: { model: "Logan", correct: "Renault", options: ["BMW", "Renault", "Audi"] }
    const questionsData = [
        { model: "Logan", correct: "Renault", options: ["BMW", "Renault", "Audi"] },
        { model: "Civic", correct: "Honda", options: ["Toyota", "Honda", "Mazda"] },
        { model: "Mustang", correct: "Ford", options: ["Chevrolet", "Dodge", "Ford"] },
        { model: "Model 3", correct: "Tesla", options: ["Tesla", "Nio", "Rivian"] },
        { model: "Golf", correct: "Volkswagen", options: ["Opel", "Volkswagen", "Skoda"] },
        { model: "Aventador", correct: "Lamborghini", options: ["Ferrari", "Lamborghini", "Maserati"] },
        { model: "911", correct: "Porsche", options: ["Porsche", "Aston Martin", "Jaguar"] },
        { model: "X5", correct: "BMW", options: ["Mercedes", "BMW", "Audi"] },
        { model: "C-Class", correct: "Mercedes-Benz", options: ["Mercedes-Benz", "Audi", "Lexus"] },
        { model: "Optima", correct: "Kia", options: ["Hyundai", "Kia", "SsangYong"] },
        { model: "Corolla", correct: "Toyota", options: ["Nissan", "Toyota", "Honda"] },
        { model: "Focus", correct: "Ford", options: ["Ford", "Chevrolet", "Fiat"] },
        { model: "Megane", correct: "Renault", options: ["Peugeot", "Renault", "Citroen"] },
        { model: "Q7", correct: "Audi", options: ["Audi", "BMW", "Volvo"] },
        { model: "RAV4", correct: "Toyota", options: ["Honda", "Toyota", "Subaru"] },
        { model: "Cruze", correct: "Chevrolet", options: ["Chevrolet", "Ford", "Dodge"] },
        { model: "Jetta", correct: "Volkswagen", options: ["Volkswagen", "Seat", "Skoda"] },
        { model: "RX-7", correct: "Mazda", options: ["Mazda", "Mitsubishi", "Subaru"] },
        { model: "Lancer", correct: "Mitsubishi", options: ["Subaru", "Mitsubishi", "Nissan"] },
        { model: "Impreza", correct: "Subaru", options: ["Subaru", "Mazda", "Suzuki"] },
        { model: "Clio", correct: "Renault", options: ["Renault", "Peugeot", "Citroen"] },
        { model: "Fiesta", correct: "Ford", options: ["Ford", "Vauxhall", "Fiat"] },
        { model: "Octavia", correct: "Skoda", options: ["Skoda", "Volkswagen", "Seat"] },
        { model: "Giulia", correct: "Alfa Romeo", options: ["Alfa Romeo", "Fiat", "Lancia"] },
        { model: "XC90", correct: "Volvo", options: ["Volvo", "Saab", "Polestar"] },
        { model: "Leaf", correct: "Nissan", options: ["Nissan", "Mitsubishi", "Kia"] },
        { model: "Stinger", correct: "Kia", options: ["Kia", "Genesis", "Hyundai"] },
        { model: "GLA", correct: "Mercedes-Benz", options: ["Mercedes-Benz", "BMW", "Audi"] },
        { model: "i8", correct: "BMW", options: ["BMW", "Audi", "Mercedes"] },
        { model: "Taycan", correct: "Porsche", options: ["Porsche", "Audi", "Tesla"] },
        { model: "DB11", correct: "Aston Martin", options: ["Aston Martin", "Jaguar", "Bentley"] },
        { model: "Continental GT", correct: "Bentley", options: ["Bentley", "Rolls-Royce", "Maybach"] },
        { model: "Phantom", correct: "Rolls-Royce", options: ["Rolls-Royce", "Bentley", "Cadillac"] },
        { model: "Gr Yaris", correct: "Toyota", options: ["Toyota", "Honda", "Suzuki"] },
        { model: "Swift", correct: "Suzuki", options: ["Suzuki", "Daihatsu", "Mazda"] },
        { model: "Duster", correct: "Dacia", options: ["Dacia", "Renault", "Lada"] },
        { model: "Sandero", correct: "Dacia", options: ["Dacia", "Renault", "Chevrolet"] },
        { model: "Vesta", correct: "Lada", options: ["Lada", "GAZ", "UAZ"] },
        { model: "Rio", correct: "Kia", options: ["Kia", "Hyundai", "Chery"] },
        { model: "Solaris", correct: "Hyundai", options: ["Hyundai", "Kia", "Geely"] },
        { model: "CX-5", correct: "Mazda", options: ["Mazda", "Honda", "Nissan"] },
        { model: "Qashqai", correct: "Nissan", options: ["Nissan", "Renault", "Mitsubishi"] },
        { model: "Tucson", correct: "Hyundai", options: ["Hyundai", "Kia", "SsangYong"] },
        { model: "Sportage", correct: "Kia", options: ["Kia", "Hyundai", "Mitsubishi"] },
        { model: "RAV4", correct: "Toyota", options: ["Toyota", "Honda", "Mazda"] }, // но RAV4 уже было, запасной дубль, но для 50 вопросов ок
        { model: "Model S", correct: "Tesla", options: ["Tesla", "Lucid", "Rivian"] },
        { model: "e-tron", correct: "Audi", options: ["Audi", "Mercedes", "BMW"] },
        { model: "iX3", correct: "BMW", options: ["BMW", "Ford", "Nio"] },
        { model: "Hilux", correct: "Toyota", options: ["Toyota", "Nissan", "Mitsubishi"] },
        { model: "F-150", correct: "Ford", options: ["Ford", "Ram", "Chevrolet"] }
    ];

    // корректировка: убедимся что ровно 50 вопросов (на всякий случай обрежем или дополним, у нас ровно 50)
    console.assert(questionsData.length === 50, "сгенерировано вопросов: " + questionsData.length);
    
    // Глобальные переменные теста
    let currentQuestionIndex = 0;        // 0 - индекс текущего вопроса
    let userAnswers = new Array(50).fill(null);   // храним ответ (строка марки)
    let answerLocked = false;             // заблокированы ли кнопки после ответа
    let quizActive = false;               // активна ли сессия теста

    // DOM элементы
    const startScreenDiv = document.getElementById('startScreen');
    const modalArea = document.getElementById('modalDecisionArea');
    const quizAreaDiv = document.getElementById('quizArea');
    const questionModelSpan = document.getElementById('questionModel');
    const answersContainer = document.getElementById('answersContainer');
    const nextButton = document.getElementById('nextButton');
    const progressCounterSpan = document.getElementById('progressCounter');
    const scoreIndicatorSpan = document.getElementById('scoreIndicator');
    const quizResultBlock = document.getElementById('quizResultBlock');

    // Функция обновления прогресса и счета
    function updateStats() {
        let correctCount = 0;
        for (let i = 0; i < currentQuestionIndex; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === questionsData[i].correct) correctCount++;
        }
        // также включая текущий, если уже ответили? но счет отображаем за отвеченные
        scoreIndicatorSpan.innerHTML = `✅ ${correctCount}`;
        progressCounterSpan.innerHTML = `Вопрос ${currentQuestionIndex+1} / 50`;
    }

    // отрисовка текущего вопроса
    function renderCurrentQuestion() {
        if (!quizActive) return;
        const q = questionsData[currentQuestionIndex];
        if (!q) return;
        questionModelSpan.innerText = q.model;
        
        // генерируем кнопки вариантов, перемешивать порядок не обязательно, но можно оставить как в источнике, но чтобы случайности не было, оставим как есть, но если нужно рандомизировать порядок опций для честности, сделаем:
        let opts = [...q.options];
        // небольшое перемешивание, чтобы порядок не был предсказуем (но правильный ответ всегда есть)
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        
        answersContainer.innerHTML = '';
        answerLocked = (userAnswers[currentQuestionIndex] !== null);
        
        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'answer-btn';
            btn.innerText = opt;
            // если уже был дан ответ на этот вопрос, показываем состояние
            if (userAnswers[currentQuestionIndex] !== null) {
                btn.disabled = true;
                const userChoice = userAnswers[currentQuestionIndex];
                const isCorrect = (userChoice === q.correct);
                if (opt === userChoice) {
                    btn.classList.add(isCorrect ? 'correct-feedback' : 'wrong-feedback');
                } else if (opt === q.correct && userChoice !== q.correct) {
                    // подсветим правильный вариант зелёным? Немного этично: покажем где правильный ответ
                    btn.classList.add('correct-feedback');
                }
            } else {
                btn.disabled = false;
                btn.addEventListener('click', (e) => {
                    if (answerLocked || !quizActive) return;
                    const selected = opt;
                    recordAnswer(selected);
                });
            }
            answersContainer.appendChild(btn);
        });
        
        // управление кнопкой далее
        if (userAnswers[currentQuestionIndex] !== null) {
            nextButton.disabled = false;
        } else {
            nextButton.disabled = true;
        }
        updateStats();
    }
    
    // запись ответа и блокировка
    function recordAnswer(selectedAnswer) {
        if (answerLocked || !quizActive) return;
        const currentQ = questionsData[currentQuestionIndex];
        // сохраняем ответ
        userAnswers[currentQuestionIndex] = selectedAnswer;
        answerLocked = true;
        
        // перерисовываем текущий вопрос с визуальной обратной связью
        renderCurrentQuestion();
        // дополнительно подсветка не требуется, render уже всё сделал
        // проверим автоматически сохранить, далее кнопка теперь активна
        nextButton.disabled = false;
        updateStats();
        // если это последний вопрос и нажат будет далее -> покажет результат
    }
    
    // переход к следующему вопросу / финал
    function goToNext() {
        if (!quizActive) return;
        // если на текущем вопросе нет ответа, не даем перейти
        if (userAnswers[currentQuestionIndex] === null) return;
        
        if (currentQuestionIndex + 1 < questionsData.length) {
            currentQuestionIndex++;
            answerLocked = false;
            renderCurrentQuestion();
        } else {
            // КОНЕЦ ТЕСТА, показать результат
            finishQuiz();
        }
    }
    
    function finishQuiz() {
        quizActive = false;
        let totalCorrect = 0;
        for (let i = 0; i < questionsData.length; i++) {
            if (userAnswers[i] === questionsData[i].correct) totalCorrect++;
        }
        const percent = Math.round((totalCorrect / 50) * 100);
        let message = '';
        if (percent >= 85) message = '🏆 АВТО-ЭКСПЕРТ! Вы достойны подиума!';
        else if (percent >= 60) message = '🚗 Хороший результат, но есть куда расти!';
        else if (percent >= 40) message = '📘 Неплохо, но стоит повторить марки авто.';
        else message = '🔧 Попробуй ещё раз, ты сможешь запомнить все модели!';
        
        quizResultBlock.innerHTML = `
            <div class="result-area">
                <h2 style="color:#ea8686;">🏁 ТЕСТ ЗАВЕРШЕН 🏁</h2>
                <p style="font-size: 2rem; font-weight: bold; color:#efb6b6;">${totalCorrect} / 50</p>
                <p style="font-size:1.1rem;">Верных ответов: ${totalCorrect} (${percent}%)</p>
                <p style="margin-top: 12px;">${message}</p>
                <button id="fullRestartBtn" class="restart-btn">🔄 ПРОЙТИ КВЕСТ ЗАНОВО</button>
            </div>
        `;
        nextButton.disabled = true;
        nextButton.style.display = 'none';
        const restartBtn = document.getElementById('fullRestartBtn');
        if (restartBtn) restartBtn.addEventListener('click', () => {
            // полный перезапуск теста с нуля, но предварительно вернуться к стартовому экрану? перезапуск через начальное меню
            resetToStartMenu();
        });
    }
    
    // сброс всего к начальному экрану
    function resetToStartMenu() {
        // скрыть тест, показать старт
        quizAreaDiv.style.display = 'none';
        startScreenDiv.style.display = 'flex';
        modalArea.innerHTML = '';
        // очистка данных теста
        currentQuestionIndex = 0;
        userAnswers = new Array(50).fill(null);
        answerLocked = false;
        quizActive = false;
        nextButton.style.display = 'block';
        quizResultBlock.innerHTML = '';
        // восстанавливаем дизайн кнопки следующей
        nextButton.disabled = true;
        updateStats(); // сброс счетчика на начальном этапе
    }
    
    // инициализация теста (сброс данных и начало)
    function initQuizSession() {
        currentQuestionIndex = 0;
        userAnswers = new Array(50).fill(null);
        answerLocked = false;
        quizActive = true;
        nextButton.disabled = true;
        nextButton.style.display = 'block';
        quizResultBlock.innerHTML = '';
        renderCurrentQuestion();
        quizAreaDiv.style.display = 'block';
        startScreenDiv.style.display = 'none';
        modalArea.innerHTML = ''; // убираем окно да/нет
    }
    
    // показать модалку с выбором "ты точно хочешь пройти этот тест?" / "нет, не хочу"
    function showConfirmModal() {
        modalArea.innerHTML = `
            <div class="modal-choice">
                <p>⚠️ Ты точно хочешь пройти этот тест? ⚠️</p>
                <div class="choice-buttons">
                    <button id="confirmYesBtn" class="choice-yes">✅ ДА, ХОЧУ</button>
                    <button id="confirmNoBtn" class="choice-no">❌ НЕТ, НЕ ХОЧУ</button>
                </div>
            </div>
        `;
        const yesBtn = document.getElementById('confirmYesBtn');
        const noBtn = document.getElementById('confirmNoBtn');
        if (yesBtn) yesBtn.addEventListener('click', () => {
            // Закрыть страницу? по заданию: при нажатии "нет, не хочу" страница закрывается
            // Для "да, хочу" - открывается тест
            modalArea.innerHTML = ''; // очищаем окно
            initQuizSession();
        });
        if (noBtn) noBtn.addEventListener('click', () => {
            // закрытие страницы (или имитация)
            window.close();
            // но для безопасности: если window.close не работает (браузеры блокируют), покажем сообщение
            document.body.innerHTML = '<div style="color:white; background:black; height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column;"><h1>🚪 Вы отказались от квеста</h1><p style="color:gray;">Страница может быть закрыта, нажмите кнопку назад</p><button onclick="history.back()" style="margin-top:20px; padding:10px; background:darkred; color:white;">Вернуться</button></div>';
        });
    }
    
    // Обработка главной кнопки "ПРОЙТИ КВЕСТ"
    document.getElementById('mainStartBtn').addEventListener('click', () => {
        // показываем модальное окно выбора
        showConfirmModal();
    });
    
    // обработчик кнопки "далее"
    nextButton.addEventListener('click', goToNext);
    
    // начальное скрытие теста и подготовка
    quizAreaDiv.style.display = 'none';
    startScreenDiv.style.display = 'flex';
    modalArea.innerHTML = '';
    quizActive = false;
    updateStats();
</script>
</body>
</html>
